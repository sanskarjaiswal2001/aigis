# AIgis default configuration
# Target system to monitor - required, no default to local
# Use "local" for this machine, or a key from targets (e.g. homelab)
target: local

targets:
  local:
    host: ""  # Empty = run on this machine
  homelab:
    host: phoenix@192.168.0.14
    auth: key
  office-vm:
    host: sanskar-jaiswal@192.168.54.2
    auth: password
    password: UGhvZW5peEAyODEw
collectors:
  enabled:
    - restic
    - disk
    - load
    - network
    - docker
  restic:
    repo_path: ""
    timeout_sec: 30
    expected_interval_hours: 24
  disk:
    mounts: []  # Empty = auto-detect
  network:
    interfaces: []  # Empty = all
  docker:
    timeout_sec: 10

rules:
  restic:
    warn_hours: 24
    critical_hours: 48
    stale_lock_warn_minutes: 60
  disk:
    warn_pct: 85
    critical_pct: 95
  load:
    warn_per_cpu: 2.0
    critical_per_cpu: 4.0
  network:
    require_up: true
  docker:
    require_healthy: true

report:
  output: stdout  # stdout | file
  file_path: null

actions:
  timeout_sec: 60
  audit_log_path: "~/.aigis/audit.log"
  registry:
    restart_container:
      script: scripts/actions/restart_container.sh
      params: [container_name]
    run_restic_backup:
      script: scripts/actions/run_restic.sh
      params: []
    clear_disk_cache:
      script: scripts/actions/clear_disk_cache.sh
      params: []

llm:
  enabled: true
  model: claude-sonnet-4-5-20250929
  max_tokens: 2048
  phoenix:
    enabled: true
    endpoint: "https://app.phoenix.arize.com/s/phoenix2810/v1/traces"
    project_name: aigis
